code: CyclingExtended
name: Cycling Extended Dashboard
mainColor: white
gauges:
  - name: heartrate
    clazz: peregin.gpv.gui.gauge.SvgDigitalHeartRateGauge
    x: 0.00
    y: &BOTTOM 0.8
    width: &W 0.2
    height: &H 0.20
  - name: cadence
    clazz: peregin.gpv.gui.gauge.SvgDigitalCadenceGauge
    x: 0.2
    y: *BOTTOM
    width: *W
    height: *H
  - name: speed
    clazz: peregin.gpv.gui.gauge.DigitalSpeedGauge
    x: 0.4
    y: *BOTTOM
    width: *W
    height: *H
  - name: temperature
    clazz: peregin.gpv.gui.gauge.SvgDigitalTemperatureGauge
    x: 0.6
    y: *BOTTOM
    width: *W
    height: *H
  - name: elev
    clazz: peregin.gpv.gui.gauge.SvgDigitalElevationGauge
    x: 0.8
    y: *BOTTOM
    width: *W
    height: *H
  - name: elevationProfile
    clazz: peregin.gpv.gui.gauge.ElevationChart
    x: 0.65
    y: 0.0
    width: 0.35
    height: 0.2
  - name: map
    clazz: peregin.gpv.gui.gauge.MapGauge
    x: 0.01
    y: 0.01
    width: 0.3
    height: 0.3