code: CyclingExtended
name: Cycling Extended Dashboard
gauges:
  - name: heartrate
    clazz: peregin.gpv.gui.gauge.SvgHeartRateGauge
    x: 0.01
    y: &BOTTOM 0.8
    size: &SIZE 0.2
  - name: cadence
    clazz: peregin.gpv.gui.gauge.DigitalCadenceGauge
    x: 0.16
    y: *BOTTOM
    size: *SIZE
  - name: speed
    clazz: peregin.gpv.gui.gauge.DigitalSpeedGauge
    x: 0.31
    y: *BOTTOM
    size: *SIZE
  - name: temperature
    clazz: peregin.gpv.gui.gauge.TemperatureGauge
    x: 0.55
    y: 0.8
    width: 0.1
    height: *SIZE
  - name: elevationProfile
    clazz: peregin.gpv.gui.gauge.ElevationChart
    x: 0.65
    y: *BOTTOM
    width: 0.33
    height: *SIZE
  - name: datetime
    clazz: peregin.gpv.gui.gauge.DateTimeGauge
    x: 0.8
    y: 0.0
    width: *SIZE
    height: *SIZE
  - name: map
    clazz: peregin.gpv.gui.gauge.MapGauge
    x: 0.01
    y: 0.01
    width: 0.3
    height: 0.3
  - name: map
    clazz: peregin.gpv.gui.gauge.CaptionGauge
    x: 0.1
    y: 0.02
    width: 0.8
    height: 0.05
